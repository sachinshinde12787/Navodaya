<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नवोदय परीक्षा सराव टेस्ट | स्पर्धा परीक्षा मार्गदर्शन केंद्र, जेऊर</title>
    <style>
        :root {
            --primary: #1a56db;
            --primary-dark: #1e429f;
            --secondary: #7e22ce;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Arial';
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 20px 15px;
            border-bottom: 4px solid var(--accent);
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.95;
        }

        .content {
            padding: 25px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .exam-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef2ff;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary-dark);
        }

        .passage-box {
            background-color: #f9fafb;
            border: 1px solid #d1d5db;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 6px;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            max-height: 220px;
            overflow-y: auto;
        }

        .question-box {
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #111827;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .option-label:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .btn-next, .btn-submit {
            margin-top: 15px;
        }

        /* Certificate / Result Styles */
        .certificate-wrapper {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
        }

        .certificate {
            border: 8px double #1e3a8a;
            padding: 25px;
            background: #fffdf5;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        .cert-header {
            text-align: center;
            border-bottom: 2px solid #b45309;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cert-title {
            color: #b45309;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .cert-subtitle {
            font-size: 16px;
            color: #1e3a8a;
            font-weight: bold;
        }

        .teachers-info {
            display: flex;
            justify-content: space-between;
            background: #fef3c7;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px dashed #f59e0b;
        }

        .teacher-card {
            width: 48%;
        }

        .cert-details {
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.8;
        }

        .cert-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #ccc;
            padding: 6px 0;
        }

        .cert-label {
            font-weight: bold;
            color: #374151;
        }

        .cert-value {
            font-weight: bold;
            color: #1e3a8a;
        }

        .honor-box {
            text-align: center;
            background: #ffffff;
            border: 2px solid #1e3a8a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .honor-title {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .honor-badge {
            font-size: 22px;
            font-weight: bold;
            color: #b45309;
        }

        .print-btn {
            background-color: #059669;
            margin-top: 20px;
        }

        .print-btn:hover {
            background-color: #047857;
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
            .header, .print-btn { display: none; }
            .certificate-wrapper { padding: 0; }
            .certificate { border: 6px double #1e3a8a; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏆 स्पर्धा परीक्षा मार्गदर्शन केंद्र, जेऊर</h1>
        <h2>नवोदय परीक्षा सराव टेस्ट (भाषा - उतारे)</h2>
    </div>

    <div class="content">
        <!-- 1. Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="form-group">
                <label for="student-name">विद्यार्थ्याचे पूर्ण नाव टाका:</label>
                <input type="text" id="student-name" placeholder="उदा. राहुल सचिन पाटील" required>
            </div>
            <div class="form-group">
                <label for="student-mobile">मोबाईल नंबर:</label>
                <input type="tel" id="student-mobile" placeholder="उदा. 9876543210" maxlength="10" required>
            </div>
            <button class="btn" onclick="startExam()">Start Exam (परीक्षा सुरू करा)</button>
        </div>

        <!-- 2. Exam Screen -->
        <div id="exam-screen" class="screen">
            <div class="exam-status">
                <span id="passage-num">उतारा: १ / ४</span>
                <span id="question-num">प्रश्न: १ / ५</span>
            </div>

            <div class="passage-box" id="passage-text"></div>

            <div class="question-box">
                <div class="question-text" id="question-text"></div>
                <ul class="options-list" id="options-container"></ul>
            </div>

            <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">नेक्स्ट क्वेश्चन (पुढील प्रश्न)</button>
            <button class="btn btn-submit" id="submit-btn" onclick="submitExam()" style="display: none; background-color: #059669;">Submit Exam (परीक्षा सबमिट करा)</button>
        </div>

        <!-- 3. Result Screen (Certificate Style) -->
        <div id="result-screen" class="screen">
            <div class="certificate-wrapper">
                <div class="certificate">
                    <div class="cert-header">
                        <div class="cert-title">🏆 स्पर्धा परीक्षा मार्गदर्शन केंद्र, जेऊर</div>
                        <div class="cert-subtitle">गुणवत्ता प्रमाणपत्र (Certificate of Achievement)</div>
                    </div>

                    <div class="teachers-info">
                        <div class="teacher-card">
                            <strong>मार्गदर्शक शिक्षक:</strong> सचिन शिंदे<br>
                            <strong>संपर्क:</strong> 8329684470
                        </div>
                        <div class="teacher-card" style="text-align: right;">
